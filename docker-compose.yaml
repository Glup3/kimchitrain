services:
  migrator:
    build:
      context: .
      target: migrator
    command: npx drizzle-kit migrate
    environment:
      - DATABASE_URL=${ZERO_UPSTREAM_DB}
    restart: "no"

  app:
    build:
      context: .
      target: app
    ports:
      - "3000:3000"
    environment:
      - ZERO_UPSTREAM_DB=${ZERO_UPSTREAM_DB}
    depends_on:
      migrator:
        condition: service_completed_successfully
