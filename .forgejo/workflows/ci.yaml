name: CI

on:
  push:
    branches: [main]

jobs:
  check:
    name: fmt / lint / typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - run: npm ci

      - run: npm run fmt:check

      - run: npm run lint

      - run: npm run lint:ts

  build:
    name: build
    needs: check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - run: npm ci

      - run: npm run build
        env:
          VITE_ZERO_SERVER: ${{ secrets.VITE_ZERO_SERVER }}

      - uses: actions/upload-artifact@v3
        with:
          name: output
          path: .output
          include-hidden-files: true

  docker:
    name: build & push image
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v3
        with:
          name: output
          path: .output

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: git.glup3.dev
          username: ${{ secrets.FORGEJO_USER }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            git.glup3.dev/${{ github.repository }}:latest
            git.glup3.dev/${{ github.repository }}:latest-arm64
            git.glup3.dev/${{ github.repository }}:${{ github.sha }}-arm64
          cache-from: type=registry,ref=git.glup3.dev/${{ github.repository }}:buildcache-arm64
          cache-to: type=registry,ref=git.glup3.dev/${{ github.repository }}:buildcache-arm64,mode=max

  migrate:
    name: migrate
    needs: docker
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - run: npm ci

      - run: npx drizzle-kit migrate
        env:
          ZERO_UPSTREAM_DB: ${{ secrets.ZERO_UPSTREAM_DB }}

      - run: echo "Migration completed successfully"

  deploy:
    name: trigger coolify deploy
    needs: [docker, migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            ${{ secrets.COOLIFY_WEBHOOK_URL }}
