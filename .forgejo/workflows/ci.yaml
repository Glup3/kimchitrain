name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: fmt / lint / typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - run: npm ci

      - run: npm run fmt:check

      - run: npm run lint

      - run: npm run lint:ts

  docker:
    name: build & push image
    needs: check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: git.glup3.dev
          username: ${{ secrets.FORGEJO_USER }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            git.glup3.dev/${{ github.repository }}:latest
            git.glup3.dev/${{ github.repository }}:${{ github.sha }}
          cache-from: type=registry,ref=git.glup3.dev/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=git.glup3.dev/${{ github.repository }}:buildcache,mode=max

      - name: trigger coolify deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            ${{ secrets.COOLIFY_WEBHOOK_URL }}
